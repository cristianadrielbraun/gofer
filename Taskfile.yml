version: "3"

tasks:
  templ:
    desc: Run templ with integrated server and hot reload
    cmds:
      - templ generate --watch --ignore-pattern='(^|/).*_templ\.go$' --proxy="http://localhost:8090" -proxyport 9090 --cmd="go run ./main.go" --open-browser=false

  tailwind:
    desc: Watch Tailwind CSS changes
    cmds:
      - tailwindcss -i ./assets/css/input.css -o ./assets/css/output.css --watch

  dev:
    desc: Start development server with hot reload
    cmds:
      - task --parallel tailwind templ

  generate:
    desc: Generate templ views and compiled CSS
    cmds:
      - templ generate
      - tailwindcss -i ./assets/css/input.css -o ./assets/css/output.css

  build:
    desc: Build for production
    deps:
      - generate
    cmds:
      - go build -o ./tmp/main .

  release:
    desc: Build a self-contained release binary with embedded assets
    deps:
      - generate
    cmds:
      - mkdir -p ./dist
      - go build -tags embedded_assets -trimpath -o ./dist/gofer .

  release:all:
    desc: Build cross-platform release archives with embedded assets
    cmds:
      - ./scripts/release-build.sh

  clean:
    desc: Clean build artifacts
    cmds:
      - rm -rf tmp/ dist/ assets/css/output.css
